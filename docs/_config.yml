title: safe-access-inline
description: Safely access deeply nested data with dot notation — one API, 9 formats, PHP + JS/TS.
url: https://felipesauer.github.io
baseurl: /safe-access-inline

remote_theme: just-the-docs/just-the-docs

plugins:
    - jekyll-remote-theme

# Color scheme: light | dark
color_scheme: light

# Search
search_enabled: true

# Aux links (top-right header)
aux_links:
    "View on GitHub":
        - "https://github.com/felipesauer/safe-access-inline"
aux_links_new_tab: true

# Footer
footer_content: >-
    <a href="https://github.com/felipesauer/safe-access-inline/blob/main/LICENSE">MIT License</a>
    &copy; 2026 Felipe Sauer.

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Navigation
nav_sort: case_insensitive

# Heading anchor links
heading_anchors: true

# External navigation links
nav_external_links:
    - title: npm
      url: https://www.npmjs.com/package/@safe-access-inline/safe-access-inline
    - title: Packagist
      url: https://packagist.org/packages/safe-access-inline/safe-access-inline

# Exclude files from Jekyll build
exclude:
    - Gemfile.lock
    - node_modules/
    - vendor/

# Analytics — uncomment and add your tracking ID to enable
# ga_tracking: G-XXXXXXXXXX
# ga_tracking_anonymize_ip: true
