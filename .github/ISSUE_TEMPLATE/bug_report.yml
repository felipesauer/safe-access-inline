name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug! Please fill out the form below to help us investigate.

    - type: dropdown
      id: package
      attributes:
          label: Package
          description: Which package is affected?
          options:
              - PHP (safe-access-inline/safe-access-inline)
              - "JS/TS (@safe-access-inline/safe-access-inline)"
              - "CLI (@safe-access-inline/cli)"
              - Both
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: Package Version
          description: "What version of the package are you using? (e.g., 0.1.0)"
          placeholder: "0.1.0"
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: Bug Description
          description: A clear and concise description of what the bug is.
          placeholder: "When I call SafeAccess::fromJson() with..."
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Steps to Reproduce
          description: Provide a minimal code example that demonstrates the bug.
          placeholder: |
              // Minimal reproduction
              $accessor = SafeAccess::fromJson('{"key": "value"}');
              $result = $accessor->get('key');
              // Expected: "value"
              // Actual: null
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What did you expect to happen?
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happened? Include error messages or stack traces if applicable.
      validations:
          required: true

    - type: input
      id: php-version
      attributes:
          label: PHP Version
          description: "Output of `php -v` (leave blank if not applicable)"
          placeholder: "8.2.0"

    - type: input
      id: node-version
      attributes:
          label: Node.js Version
          description: "Output of `node -v` (leave blank if not applicable)"
          placeholder: "22.0.0"

    - type: input
      id: os
      attributes:
          label: Operating System
          placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"

    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Any other context, screenshots, or logs that might help.
