name: Mutation Testing

on:
    push:
        paths:
            - "packages/js/src/**"
            - "packages/php/src/**"
            - ".github/workflows/mutation-ci.yml"
    schedule:
        - cron: "0 3 * * 1" # Monday 03:00 UTC
    workflow_dispatch:

permissions:
    contents: read

jobs:
    js-mutation:
        name: Stryker (JS)
        runs-on: ubuntu-latest
        continue-on-error: true # non-blocking until MSI baseline is stable for ≥ 4 weeks

        defaults:
            run:
                working-directory: packages/js

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node-cached
              with:
                  node-version: "24"
                  working-directory: packages/js

            - name: Install dependencies
              working-directory: .
              run: npm install

            - name: Run Stryker mutation tests
              run: npm run test:mutation

            - name: Upload Stryker report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: stryker-report
                  path: packages/js/reports/mutation/

    php-mutation:
        name: Infection (PHP)
        runs-on: ubuntu-latest
        continue-on-error: true # non-blocking until MSI baseline is stable for ≥ 4 weeks

        defaults:
            run:
                working-directory: packages/php

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
              with:
                  php-version: "8.4"
                  extensions: json, simplexml, libxml
                  coverage: pcov

            - name: Get Composer cache directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer dependencies
              uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: php-8.4-full-composer-${{ hashFiles('packages/php/composer.json') }}
                  restore-keys: php-8.4-full-composer-

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install optional dependencies (full)
              run: composer require symfony/yaml devium/toml --dev --no-progress

            - name: Run Infection mutation tests
              run: composer test:mutation

            - name: Upload Infection report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: infection-report
                  path: packages/php/reports/infection/infection.log
