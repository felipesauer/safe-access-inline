name: CodeQL

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: "30 5 * * 1"
    workflow_dispatch:

permissions:
    actions: read
    contents: read
    security-events: write

jobs:
    analyze:
        name: Analyze (${{ matrix.language }})
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                language: [javascript-typescript, php]

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Initialize CodeQL
              uses: github/codeql-action/init@f3bf8cc176dca415fb047f4cf6d909543c552d99 # v3
              with:
                  languages: ${{ matrix.language }}

            - name: Autobuild
              uses: github/codeql-action/autobuild@f3bf8cc176dca415fb047f4cf6d909543c552d99 # v3

            - name: Perform CodeQL analysis
              uses: github/codeql-action/analyze@f3bf8cc176dca415fb047f4cf6d909543c552d99 # v3
