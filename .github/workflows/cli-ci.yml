name: CLI CI

on:
    push:
        branches: [main]
        paths:
            - "packages/cli/**"
            - "packages/js/**"
            - ".github/workflows/cli-ci.yml"
    pull_request:
        branches: [main]
        paths:
            - "packages/cli/**"
            - "packages/js/**"
            - ".github/workflows/cli-ci.yml"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    test:
        name: Node ${{ matrix.node }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ["22", "24"]

        defaults:
            run:
                working-directory: packages/cli

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: ./.github/actions/setup-node-cached
              with:
                  node-version: ${{ matrix.node }}
                  working-directory: packages/cli

            # 👇 1. Instala TUDO de uma vez na raiz (Workspaces faz a mágica)
            - name: Install dependencies
              working-directory: .
              run: npm install

            # 👇 2. Compila o pacote JS primeiro (porque o CLI depende dele)
            - name: Build JS package
              working-directory: packages/js
              run: npm run build

            # 👇 3. Volta para o comportamento padrão (packages/cli) para compilar e testar
            - name: Build
              run: npm run build

            - name: Lint
              if: matrix.node == '24'
              run: npm run lint

            - name: Type check
              if: matrix.node == '24'
              run: npm run typecheck

            - name: Run tests
              run: npm test -- --coverage

            - name: Upload coverage to Codecov
              if: matrix.node == '24'
              uses: ./.github/actions/upload-coverage
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  flags: cli
                  directory: packages/cli/coverage

            - name: Mutation testing
              if: matrix.node == '24'
              run: npm run test:mutation
