name: Cross-Parity

on:
    push:
        branches: [main]
        paths:
            - "packages/fixtures/**"
            - "packages/js/**"
            - "packages/php/**"
            - ".github/workflows/cross-parity.yml"
    pull_request:
        branches: [main]
        paths:
            - "packages/fixtures/**"
            - "packages/js/**"
            - "packages/php/**"
            - ".github/workflows/cross-parity.yml"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    js-parity:
        name: JS cross-parity
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/js
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: packages/js/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Cross-parity tests
              run: npm run test:parity

    php-parity:
        name: PHP cross-parity
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/php
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2
              with:
                  php-version: "8.4"
                  extensions: json, simplexml, libxml

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Cross-parity tests
              run: composer test:parity
