name: Upload coverage to Codecov
description: Uploads coverage reports to Codecov with consistent configuration.

inputs:
    token:
        description: Codecov upload token
        required: true
    flags:
        description: Codecov flags for this upload (e.g. javascript, php, cli)
        required: true
    directory:
        description: Directory containing coverage files (for JS/CLI lcov reports)
        required: false
    files:
        description: Specific coverage file path (for PHP clover XML)
        required: false

runs:
    using: composite
    steps:
        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
          with:
              token: ${{ inputs.token }}
              flags: ${{ inputs.flags }}
              directory: ${{ inputs.directory }}
              files: ${{ inputs.files }}
              fail_ci_if_error: false
